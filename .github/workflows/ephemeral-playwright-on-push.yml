name: Ephemeral Playwright Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      project_slug:
        description: Flux plugin slug in ephemeral registry
        required: false
        default: flux-one
      env_profile:
        description: Environment profile (sandbox-clean, sandbox-woo, sandbox-mocked-services)
        required: false
        default: sandbox-clean

concurrency:
  group: ephemeral-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-ephemeral-smoke:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    env:
      PROJECT_SLUG: ${{ inputs.project_slug || 'flux-one' }}
      ENV_PROFILE: ${{ inputs.env_profile || 'sandbox-clean' }}
      HARNESS_DIR: /home/edaniels/repos/wp-local/ephemeral-wp-test
      LOG_ROOT: /home/edaniels/repos/logs/flux-ephemeral
    steps:
      - name: Verify harness exists
        run: |
          set -euo pipefail
          test -d "$HARNESS_DIR"
          test -x "$HARNESS_DIR/scripts/test-project.sh"

      - name: Run ephemeral smoke
        id: run
        run: |
          set -euo pipefail
          cd "$HARNESS_DIR"
          bash scripts/test-project.sh "$PROJECT_SLUG" "$ENV_PROFILE"

          RUN_DIR="$(ls -1dt "$LOG_ROOT/$PROJECT_SLUG"/*_${PROJECT_SLUG}_${ENV_PROFILE} 2>/dev/null | head -n1 || true)"
          if [ -z "$RUN_DIR" ]; then
            echo "Could not locate run artifact folder under $LOG_ROOT/$PROJECT_SLUG" >&2
            exit 1
          fi

          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"
          echo "result_json=$RUN_DIR/result.json" >> "$GITHUB_OUTPUT"

      - name: Upload run artifacts
        if: always() && steps.run.outputs.run_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: ephemeral-${{ env.PROJECT_SLUG }}-${{ github.run_number }}
          path: ${{ steps.run.outputs.run_dir }}
          if-no-files-found: warn

      - name: Publish result summary
        if: always() && steps.run.outputs.result_json != ''
        run: |
          set -euo pipefail
          if [ -f "${{ steps.run.outputs.result_json }}" ]; then
            echo "## Ephemeral Smoke Result" >> "$GITHUB_STEP_SUMMARY"
            cat "${{ steps.run.outputs.result_json }}" >> "$GITHUB_STEP_SUMMARY"
          fi
